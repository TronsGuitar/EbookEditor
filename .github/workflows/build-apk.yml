name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APK_PATH: app/build/outputs/apk/debug/app-debug.apk
      ZIP_PATH: dist/app-debug-${{ github.run_number }}.zip

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "platform-tools"

      - name: Grant Gradle wrapper execute permission
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Zip debug APK
        run: |
          mkdir -p dist
          zip -j "$ZIP_PATH" "$APK_PATH"

      - name: Upload debug APK ZIP
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-zip
          path: ${{ env.ZIP_PATH }}
          retention-days: 14

      - name: Check email configuration
        id: email_config
        if: github.event_name != 'pull_request'
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          BUILD_EMAIL_TO: ${{ secrets.BUILD_EMAIL_TO }}
          BUILD_EMAIL_FROM: ${{ secrets.BUILD_EMAIL_FROM }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
        run: |
          if [ -n "$SMTP_SERVER" ] \
            && [ -n "$SMTP_PORT" ] \
            && [ -n "$SMTP_USERNAME" ] \
            && [ -n "$SMTP_PASSWORD" ] \
            && [ -n "$BUILD_EMAIL_TO" ] \
            && [ -n "$BUILD_EMAIL_FROM" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            if [ -n "$SMTP_SECURE" ]; then
              echo "smtp_secure=$SMTP_SECURE" >> "$GITHUB_OUTPUT"
            else
              echo "smtp_secure=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "::warning::Email delivery skipped: configure SMTP_SERVER, SMTP_PORT, SMTP_USERNAME, SMTP_PASSWORD, BUILD_EMAIL_TO, and BUILD_EMAIL_FROM secrets."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Email zipped APK
        if: github.event_name != 'pull_request' && steps.email_config.outputs.enabled == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "${{ github.event.repository.name }} build #${{ github.run_number }} APK"
          to: ${{ secrets.BUILD_EMAIL_TO }}
          from: ${{ secrets.BUILD_EMAIL_FROM }}
          secure: ${{ steps.email_config.outputs.smtp_secure }}
          body: |
            Build completed for ${{ github.repository }}.
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          attachments: ${{ env.ZIP_PATH }}
